workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60

    environment:
      node: 18

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build web project
        script: |
          npm run build

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Build iOS
        script: |
          xcodebuild -workspace ios/App/App.xcworkspace \
          -scheme App \
          -configuration Release \
          -sdk iphoneos \
          -archivePath $CM_BUILD_DIR/App.xcarchive archive

    artifacts:
      - build/ios/ipa/*.ipa