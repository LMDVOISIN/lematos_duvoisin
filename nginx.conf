# Nginx Configuration for Le Matos Du Voisin
# Place this in: /etc/nginx/sites-available/lematosduvoisin
# Then create symlink: sudo ln -s /etc/nginx/sites-available/lematosduvoisin /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name lematosduvoisin.fr www.lematosduvoisin.fr;
    
    # Redirect HTTP to HTTPS (uncomment after SSL setup)
    # return 301 https://$server_name$request_uri;
    
    # Root directory (adjust path as needed)
    root /var/www/vhosts/lematosduvoisin.fr/httpdocs;
    index index.html;
    
    # Logging
    access_log /var/log/nginx/lematosduvoisin_access.log;
    error_log /var/log/nginx/lematosduvoisin_error.log;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        application/atom+xml
        image/svg+xml;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Hide server version
    server_tokens off;
    
    # React Router - redirect all routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    location ~* \.(css|js)$ {
        expires 1M;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    location ~* \.(woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Don't cache HTML
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    
    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~* \.(env|log|sql|md|json|lock)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Deny access to specific files
    location ~ /(package\.json|package-lock\.json|README\.md|DEPLOYMENT\.md|CONFIGURATION\.md) {
        deny all;
        access_log off;
        log_not_found off;
    }
}

